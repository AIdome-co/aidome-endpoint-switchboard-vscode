name: CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"
      - ".github/copilot-instructions.md"
      - ".github/instructions/**"
      - ".github/skills/**"
      - "AGENTS.md"
      - "CLAUDE.md"
  push:
    branches: [main, develop]
    # Keep this list duplicated: GitHub Actions workflow parsing here does not reliably
    # support YAML anchors/aliases for shared trigger filters.
    paths-ignore:
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"
      - ".github/copilot-instructions.md"
      - ".github/instructions/**"
      - ".github/skills/**"
      - "AGENTS.md"
      - "CLAUDE.md"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Compile
        run: npm run compile
      
      - name: Run tests
        run: npm test

      - name: Run E2E tests (Extension Development Host)
        run: xvfb-run -a npm run test:e2e
        if: runner.os == 'Linux'

      - name: Run E2E tests (Extension Development Host)
        run: npm run test:e2e
        if: runner.os != 'Linux'

      - name: Enforce Continue adapter coverage gate
        run: npm run test:continue:coverage

      - name: Enforce Kilo adapter coverage gate
        run: npm run test:kilo:coverage

      - name: Enforce Roo Code adapter coverage gate
        run: npm run test:roo:coverage
      
      - name: Package extension
        run: npm run package
      
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: vsix-package
          path: '*.vsix'
          retention-days: 7

      - name: Upload E2E test logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-logs-${{ matrix.os }}
          path: |
            .vscode-test/
            out-test/
          retention-days: 7
