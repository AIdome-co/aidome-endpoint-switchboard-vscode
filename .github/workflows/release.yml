name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example v0.2.0).
        required: true
        type: string
      publish_registries:
        description: Also publish to VS Code Marketplace and Open VSX.
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches extension version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          echo "Release tag: $RELEASE_TAG"
          echo "Extension version: $PACKAGE_VERSION"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag/version mismatch."
            echo "::error::Git tag is $RELEASE_TAG, but the VS Code extension manifest version is $PACKAGE_VERSION."
            echo "::error::Retag this commit as $EXPECTED_TAG, or bump package.json before creating the release tag."
            exit 1
          fi

      - name: Validate changelog entry exists
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"

          if ! grep -Eq "^## \[$RELEASE_VERSION\]" CHANGELOG.md; then
            echo "::error::Missing CHANGELOG entry for $RELEASE_VERSION. Update CHANGELOG.md before tagging a release."
            exit 1
          fi
        
      - name: Build release body
        run: node .github/scripts/build-release-body.mjs "$RELEASE_TAG" release-body.md

      - name: Lint
        run: npm run lint
      
      - name: Compile
        run: npm run compile
      
      - name: Run tests
        run: npm test
      
      - name: Package extension
        run: npx @vscode/vsce package --out aidome-endpoint-switchboard.vsix
        
      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: aidome-endpoint-switchboard.vsix
          fail_on_unmatched_files: true
          body_path: release-body.md
          append_body: true
          generate_release_notes: true

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ env.RELEASE_TAG }}
          path: aidome-endpoint-switchboard.vsix
          if-no-files-found: error
          retention-days: 90

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push' || inputs.publish_registries
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is not configured - skipping VS Code Marketplace publish."
            exit 0
          fi

          npx @vscode/vsce publish --packagePath aidome-endpoint-switchboard.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: github.event_name == 'push' || inputs.publish_registries
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is not configured - skipping Open VSX publish because Marketplace publish is required first."
            exit 0
          fi

          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT is not configured - skipping Open VSX publish."
            exit 0
          fi

          npx ovsx publish aidome-endpoint-switchboard.vsix --pat "$OVSX_PAT"

  apply-release-labels:
    name: Apply labels to referenced PRs
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Apply labels from release notes to referenced PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        shell: bash
        run: |
          RELEASE_BODY=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json body -q '.body' 2>/dev/null)

          if [ -z "$RELEASE_BODY" ]; then
            echo "No release body found for $RELEASE_TAG - skipping label assignment."
            exit 0
          fi

          # Extract PR numbers referenced in the release body (e.g., "#42" or "PR #42")
          PR_NUMBERS=$(printf '%s' "$RELEASE_BODY" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u || true)

          apply_label_for_pr() {
            local PR_NUMBER=$1
            local PR_TITLE
            PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q '.title' 2>/dev/null) || return 0

            # Strip prefix from titles like "feat: …" or "feat(scope): …"
            local PREFIX
            local LABELS=""
            PREFIX=$(printf '%s' "$PR_TITLE" | sed -E 's/^([a-zA-Z]+)[:(].*/\1/' | tr '[:upper:]' '[:lower:]')
            LABELS=$(bash .github/scripts/label-from-prefix.sh "$PREFIX")

            if [ -z "$LABELS" ]; then
              echo "No label mapping for prefix '${PREFIX}' in PR #${PR_NUMBER} — skipping."
              return 0
            fi

            echo "Applying label(s) '$LABELS' to PR #${PR_NUMBER} (title: $PR_TITLE)..."
            read -r -a LABEL_ARRAY <<< "$LABELS"
            for label in "${LABEL_ARRAY[@]}"; do
              APPLY_ERR=$(gh pr edit "$PR_NUMBER" \
                --repo "$REPO" \
                --add-label "$label" 2>&1) \
                || echo "::warning::Could not apply label '$label' to PR #${PR_NUMBER}: ${APPLY_ERR}"
            done
          }

          if [ -z "$PR_NUMBERS" ]; then
            echo "No PR references found in release body — skipping label assignment."
            exit 0
          fi

          for PR_NUM in $PR_NUMBERS; do
            apply_label_for_pr "$PR_NUM"
          done

