name: Release

on:
  release:
    types: [published, prereleased]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-upload:
    name: Build, test, and upload release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npx @vscode/vsce package --out aidome-endpoint-switchboard.vsix

      - name: Upload VSIX to GitHub Release
        run: gh release upload "${{ github.ref_name }}" aidome-endpoint-switchboard.vsix --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ github.ref_name }}
          path: aidome-endpoint-switchboard.vsix
          retention-days: 90

      # Uncomment when ready to publish to VS Code Marketplace:
      # - name: Publish to VS Code Marketplace
      #   run: npx @vscode/vsce publish --pat ${{ secrets.VSCE_PAT }}

      # Uncomment when ready to publish to Open VSX (for Cursor/VSCodium):
      # - name: Publish to Open VSX
      #   run: npx ovsx publish aidome-endpoint-switchboard.vsix --pat ${{ secrets.OVSX_PAT }}

  apply-release-labels:
    name: Apply labels to referenced PRs
    runs-on: ubuntu-latest
    needs: build-and-upload

    steps:
      - name: Apply labels from release notes to referenced PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_BODY: ${{ github.event.release.body }}
        shell: bash
        run: |
          # Extract PR numbers referenced in the release body (e.g., "#42" or "PR #42")
          PR_NUMBERS=$(printf '%s' "$RELEASE_BODY" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u)

          # Maps a conventional-commit title prefix to a label, matching the
          # rules in .github/workflows/pr-auto-labeler.yml and .github/labeler.yml.
          apply_label_for_pr() {
            local PR_NUMBER=$1
            local PR_TITLE
            PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q '.title' 2>/dev/null) || return 0

            # Strip prefix from titles like "feat: …" or "feat(scope): …"
            local PREFIX
            PREFIX=$(printf '%s' "$PR_TITLE" | sed -E 's/^([a-zA-Z]+)[:(].*/\1/' | tr '[:upper:]' '[:lower:]')

            local LABEL=""
            case "$PREFIX" in
              feat|feature) LABEL="enhancement"   ;;
              fix|bugfix)   LABEL="bug"            ;;
              hotfix)       LABEL="bug"            ;;
              docs)         LABEL="documentation"  ;;
              ci)           LABEL="ci"             ;;
              security)     LABEL="security"       ;;
              perf)         LABEL="performance"    ;;
              build)        LABEL="infrastructure" ;;
              test|tests)   LABEL="tests"          ;;
              chore)        LABEL="chore"          ;;
              *)
                echo "No label mapping for prefix '${PREFIX}' in PR #${PR_NUMBER} — skipping."
                return 0
                ;;
            esac

            echo "Applying label '$LABEL' to PR #${PR_NUMBER} (title: $PR_TITLE)..."
            APPLY_ERR=$(gh pr edit "$PR_NUMBER" \
              --repo "$REPO" \
              --add-label "$LABEL" 2>&1) \
              || echo "::warning::Could not apply label '$LABEL' to PR #${PR_NUMBER}: ${APPLY_ERR}"
          }

          if [ -z "$PR_NUMBERS" ]; then
            echo "No PR references found in release body — skipping label assignment."
            exit 0
          fi

          for PR_NUM in $PR_NUMBERS; do
            apply_label_for_pr "$PR_NUM"
          done

