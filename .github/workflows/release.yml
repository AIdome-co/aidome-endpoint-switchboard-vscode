name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches extension version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION. Expected $EXPECTED_TAG."
            exit 1
          fi

      - name: Lint
        run: npm run lint
      
      - name: Compile
        run: npm run compile
      
      - name: Run tests
        run: npm test
      
      - name: Package extension
        run: npx @vscode/vsce package --out aidome-endpoint-switchboard.vsix
        
      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: aidome-endpoint-switchboard.vsix
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## LLM Endpoint Switchboard ${{ github.ref_name }}
            
            ### Installation
            
            **VS Code Marketplace**: Search for "LLM Endpoint Switchboard" in VS Code Extensions
            
            **Manual Install (air-gapped)**: 
            1. Download the `.vsix` file below
            2. `Ctrl+Shift+P` → "Extensions: Install from VSIX..."
            3. Select the downloaded file
            
            ### What's New
            See [CHANGELOG.md](https://github.com/AIdome-co/aidome-endpoint-switchboard-vscode/blob/main/CHANGELOG.md) for details.

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ github.ref_name }}
          path: aidome-endpoint-switchboard.vsix
          if-no-files-found: error
          retention-days: 90
            
      # Uncomment when ready to publish to VS Code Marketplace:
      # - name: Publish to VS Code Marketplace
      #   run: npx @vscode/vsce publish --pat ${{ secrets.VSCE_PAT }}
      
      # Uncomment when ready to publish to Open VSX (for Cursor/VSCodium):
      # - name: Publish to Open VSX
      #   run: npx ovsx publish aidome-endpoint-switchboard.vsix --pat ${{ secrets.OVSX_PAT }}

  apply-release-labels:
    name: Apply labels to referenced PRs
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Apply labels from release notes to referenced PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          RELEASE_BODY=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json body -q '.body' 2>/dev/null)

          if [ -z "$RELEASE_BODY" ]; then
            echo "No release body found for $RELEASE_TAG - skipping label assignment."
            exit 0
          fi

          # Extract PR numbers referenced in the release body (e.g., "#42" or "PR #42")
          PR_NUMBERS=$(printf '%s' "$RELEASE_BODY" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u)

          # Keep this mapping aligned with .github/workflows/pr-auto-labeler.yml.
          apply_label_for_pr() {
            local PR_NUMBER=$1
            local PR_TITLE
            PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q '.title' 2>/dev/null) || return 0

            # Strip prefix from titles like "feat: …" or "feat(scope): …"
            local PREFIX
            local LABELS=""
            PREFIX=$(printf '%s' "$PR_TITLE" | sed -E 's/^([a-zA-Z]+)[:(].*/\1/' | tr '[:upper:]' '[:lower:]')
            case "$PREFIX" in
              feat|feature|frontend|forntend|perf)
                LABELS="enhancement"
                ;;
              fix|bugfix|security)
                LABELS="bug"
                ;;
              hotfix)
                LABELS="hotfix bug"
                ;;
              docs)
                LABELS="documentation"
                ;;
              ci)
                LABELS="ci"
                ;;
              build|docker|chore)
                LABELS="infrastructure"
                ;;
              patch)
                LABELS="patch"
                ;;
              release)
                LABELS="release"
                ;;
              test|tests)
                LABELS="tests"
                ;;
              *)
                echo "No label mapping for prefix '${PREFIX}' in PR #${PR_NUMBER} — skipping."
                return 0
                ;;
            esac

            echo "Applying label(s) '$LABELS' to PR #${PR_NUMBER} (title: $PR_TITLE)..."
            read -r -a LABEL_ARRAY <<< "$LABELS"
            for label in "${LABEL_ARRAY[@]}"; do
              APPLY_ERR=$(gh pr edit "$PR_NUMBER" \
                --repo "$REPO" \
                --add-label "$label" 2>&1) \
                || echo "::warning::Could not apply label '$label' to PR #${PR_NUMBER}: ${APPLY_ERR}"
            done
          }

          if [ -z "$PR_NUMBERS" ]; then
            echo "No PR references found in release body — skipping label assignment."
            exit 0
          fi

          for PR_NUM in $PR_NUMBERS; do
            apply_label_for_pr "$PR_NUM"
          done

